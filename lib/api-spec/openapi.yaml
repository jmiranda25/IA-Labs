              type: string
              enum: [going, interested, cancelled]
              nullable: true
          required: [counts]

    EventListPageResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/EventDetail"
        nextCursor:
          type: string
          nullable: true
      required: [items, nextCursor]

    EventRsvp:
      type: object
      properties:
        id:
          type: string
        eventId:
          type: string
        userId:
          type: string
        status:
          type: string
          enum: [going, interested, cancelled]
        createdAt:
          type: string
          format: date-time
      required: [id, eventId, userId, status, createdAt]

    RsvpBody:
      type: object
      properties:
        status:
          type: string
          enum: [going, interested, cancelled]
      required: [status]

    CreateEventBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        location:
          type: string
          nullable: true
        capacity:
          type: integer
          nullable: true
        isOnline:
          type: boolean
        meetingUrl:
          type: string
          nullable: true
        coverUrl:
          type: string
          nullable: true
      required: [title, description, startsAt, endsAt]

    UpdateEventBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        location:
          type: string
          nullable: true
        capacity:
          type: integer
          nullable: true
        isOnline:
          type: boolean
        meetingUrl:
          type: string
          nullable: true
        coverUrl:
          type: string
          nullable: true

    EventCoverResponse:
