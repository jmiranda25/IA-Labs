            reactions:
              type: array
              items:
                $ref: "#/components/schemas/ReactionSummary"
          required: [replies, reactions]

    ForumPostListResponse:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/ForumPostSummary"
        total:
          type: integer
      required: [posts, total]

    CreateForumPostBody:
      type: object
      properties:
        categoryId:
          type: string
        title:
          type: string
        body:
