        status:
          type: string
          enum: [active, closed]
        tags:
          type: array
          items:
            type: string
        imageUrl:
          type: string
          nullable: true
        authorId:
          type: string
        authorName:
          type: string
        authorAvatar:
          type: string
          nullable: true
        messageCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, description, type, status, tags, authorId, authorName, messageCount, createdAt, updatedAt]

    ListingListResponse:
      type: object
      properties:
        listings:
          type: array
          items:
