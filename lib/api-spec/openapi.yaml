openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AI Community Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profiles and member directory
  - name: events
    description: Events and RSVPs
  - name: forum
    description: Forum posts and replies
  - name: resources
    description: Resource library
  - name: marketplace
    description: Marketplace listings and messages
  - name: notifications
    description: In-app notifications
  - name: admin
    description: Admin moderation
  - name: landing
    description: Editable landing content
  - name: storage
    description: File storage
  - name: community
    description: Community-wide aggregates

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Community stats (wow endpoint) ──────────────────────────────────────────
  /community/stats:
    get:
      operationId: getCommunityStats
      tags: [community]
      summary: Get community-wide statistics
      responses:
        "200":
          description: Community stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityStats"

  /activity/feed:
    get:
      operationId: getActivityFeed
      tags: [community]
      summary: Recent activity feed across all modules
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Activity feed items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # ── Users / Member Directory ────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/me/avatar:
    post:
      operationId: uploadAvatar
      tags: [users]
      summary: Upload avatar image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
              required: [avatar]
      responses:
        "200":
          description: Avatar uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadAvatarResponse"

  /users/check-username:
    get:
      operationId: checkUsernameAvailability
      tags: [users]
      summary: Check if a username is available
      parameters:
        - name: value
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Username availability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckUsernameResponse"

  /users/by-username/{username}:
    get:
      operationId: getUserByUsername
      tags: [users]
      summary: Get a public user profile by username
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicUser"
        "404":
          description: User not found

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List members (public directory, cursor-paginated)
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
            enum: [participant, administrator]
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 24
            maximum: 60
      responses:
        "200":
          description: Cursor-paginated member list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberListResponse"

  /users/{userId}:
    get:
      operationId: getUserById
      tags: [users]
      summary: Get a user profile by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  # ── Events ──────────────────────────────────────────────────────────────────
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events (cursor-paginated)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [upcoming, past]
            default: upcoming
        - name: mode
          in: query
          schema:
            type: string
            enum: [online, in_person]
        - name: q
          in: query
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 12
            maximum: 60
      responses:
        "200":
          description: Cursor-paginated events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventListPageResponse"

  /events/upcoming:
    get:
      operationId: getUpcomingEvents
      tags: [events]
      summary: Get upcoming events (dashboard widget)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Upcoming events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventDetail"

  /events/{slug}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get a single event by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDetail"
        "404":
          description: Not found

  /events/{slug}/rsvp:
    post:
      operationId: rsvpEvent
      tags: [events]
      summary: RSVP to an event (going / interested / cancelled)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RsvpBody"
      responses:
        "200":
          description: RSVP result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventRsvp"
        "409":
          description: Event full

  /admin/events:
    get:
      operationId: adminListEvents
      tags: [events]
      summary: List all events for admin management
      responses:
        "200":
          description: All events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventDetail"
    post:
      operationId: adminCreateEvent
      tags: [events]
      summary: Create an event (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventBody"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDetail"

  /admin/events/{slug}:
    patch:
      operationId: adminUpdateEvent
      tags: [events]
      summary: Update an event (admin)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventBody"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDetail"
    delete:
      operationId: adminDeleteEvent
      tags: [events]
      summary: Delete an event (admin)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /admin/events/{slug}/cover:
    post:
      operationId: adminUploadEventCover
      tags: [events]
      summary: Upload event cover image (admin)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                cover:
                  type: string
                  format: binary
              required: [cover]
      responses:
        "200":
          description: Cover URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventCoverResponse"

  # ── Forum ────────────────────────────────────────────────────────────────────
  /forum/categories:
    get:
      operationId: listForumCategories
      tags: [forum]
      summary: List forum categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ForumCategory"
    post:
      operationId: createForumCategory
      tags: [forum]
      summary: Create a forum category (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateForumCategoryBody"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForumCategory"

  /forum/posts:
    get:
      operationId: listForumPosts
      tags: [forum]
      summary: List forum posts
      parameters:
        - name: categoryId
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForumPostListResponse"
    post:
      operationId: createForumPost
      tags: [forum]
      summary: Create a forum post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateForumPostBody"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForumPost"

  /forum/posts/trending:
    get:
      operationId: getTrendingForumPosts
      tags: [forum]
      summary: Get trending forum posts
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Trending posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ForumPostSummary"

  /forum/posts/{postId}:
    get:
      operationId: getForumPost
      tags: [forum]
      summary: Get a forum post with its replies
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post with replies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForumPostDetail"
    put:
      operationId: updateForumPost
      tags: [forum]
      summary: Update a forum post (author or admin)
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateForumPostBody"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForumPost"
    delete:
      operationId: deleteForumPost
      tags: [forum]
      summary: Delete a forum post (author or admin)
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /forum/posts/{postId}/replies:
    get:
      operationId: listForumReplies
      tags: [forum]
      summary: List replies for a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Replies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ForumReply"
    post:
      operationId: createForumReply
      tags: [forum]
      summary: Create a reply to a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateForumReplyBody"
      responses:
        "201":
          description: Created reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForumReply"

  /forum/replies/{replyId}:
    put:
      operationId: updateForumReply
      tags: [forum]
      summary: Update a reply (author or admin)
      parameters:
        - name: replyId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateForumReplyBody"
      responses:
        "200":
          description: Updated reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForumReply"
    delete:
      operationId: deleteForumReply
      tags: [forum]
      summary: Delete a reply (author or admin)
      parameters:
        - name: replyId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /forum/reactions:
    post:
      operationId: toggleForumReaction
      tags: [forum]
      summary: Toggle an emoji reaction on a post or reply
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToggleReactionBody"
      responses:
        "200":
          description: Updated reaction counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReactionResult"

  # ── Resources ────────────────────────────────────────────────────────────────
  /resources:
    get:
      operationId: listResources
      tags: [resources]
      summary: List resources
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated resources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceListResponse"
    post:
      operationId: createResource
      tags: [resources]
      summary: Upload a new resource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResourceBody"
      responses:
        "201":
          description: Created resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"

  /resources/{resourceId}:
    get:
      operationId: getResource
      tags: [resources]
      summary: Get a resource
      parameters:
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
    delete:
      operationId: deleteResource
      tags: [resources]
      summary: Delete a resource (author or admin)
      parameters:
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /resources/categories:
    get:
      operationId: listResourceCategories
      tags: [resources]
      summary: List distinct resource categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  # ── Marketplace ──────────────────────────────────────────────────────────────
  /marketplace/listings:
    get:
      operationId: listMarketplaceListings
      tags: [marketplace]
      summary: List marketplace listings
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [offering, seeking]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, closed, all]
            default: active
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated listings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingListResponse"
    post:
      operationId: createMarketplaceListing
      tags: [marketplace]
      summary: Create a marketplace listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateListingBody"
      responses:
        "201":
          description: Created listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceListing"

  /marketplace/listings/featured:
    get:
      operationId: getFeaturedListings
      tags: [marketplace]
      summary: Get featured/recent active listings
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 6
      responses:
        "200":
          description: Featured listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketplaceListing"

  /marketplace/listings/{listingId}:
    get:
      operationId: getMarketplaceListing
      tags: [marketplace]
      summary: Get a marketplace listing
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceListing"
    put:
      operationId: updateMarketplaceListing
      tags: [marketplace]
      summary: Update a listing (owner or admin)
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateListingBody"
      responses:
        "200":
          description: Updated listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceListing"
    delete:
      operationId: deleteMarketplaceListing
      tags: [marketplace]
      summary: Delete a listing (owner or admin)
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /marketplace/messages:
    get:
      operationId: listMyMessages
      tags: [marketplace]
      summary: List message threads for current user
      responses:
        "200":
          description: Message threads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessageThread"

  /marketplace/messages/{listingId}:
    get:
      operationId: getMessageThread
      tags: [marketplace]
      summary: Get messages for a listing thread
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages in thread
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketplaceMessage"
    post:
      operationId: sendMessage
      tags: [marketplace]
      summary: Send a message about a listing
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Sent message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceMessage"

  # ── Notifications ────────────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for current user
      parameters:
        - name: unreadOnly
          in: query
          schema:
            type: boolean
            default: false
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"

  /notifications/mark-all-read:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "204":
          description: Marked

  /notifications/{notificationId}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a single notification as read
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Marked

  # ── Admin ─────────────────────────────────────────────────────────────────────
  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: Admin list all users
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

  /admin/users/{userId}/role:
    put:
      operationId: adminUpdateUserRole
      tags: [admin]
      summary: Change a user's role
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRoleBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /admin/users/{userId}/ban:
    post:
      operationId: adminBanUser
      tags: [admin]
      summary: Ban a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Banned

  /admin/moderation/queue:
    get:
      operationId: getModerationQueue
      tags: [admin]
      summary: Get flagged content for moderation
      responses:
        "200":
          description: Flagged items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModerationItem"

  /admin/moderation/{itemId}/resolve:
    post:
      operationId: resolveModerationItem
      tags: [admin]
      summary: Resolve a moderation item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveModerationBody"
      responses:
        "204":
          description: Resolved

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Admin dashboard statistics
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  # ── Landing Content ──────────────────────────────────────────────────────────
  /landing/content:
    get:
      operationId: getLandingContent
      tags: [landing]
      summary: Get all landing page content sections
      responses:
        "200":
          description: Landing content
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LandingSection"

  /landing/content/{section}:
    put:
      operationId: updateLandingSection
      tags: [landing]
      summary: Update a landing page section (admin only)
      parameters:
        - name: section
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLandingSectionBody"
      responses:
        "200":
          description: Updated section
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LandingSection"

  # ── Storage ──────────────────────────────────────────────────────────────────
  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestUploadUrlBody"
      responses:
        "200":
          description: Presigned URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestUploadUrlResponse"

  /storage/objects/{objectPath}:
    get:
      operationId: getStorageObject
      tags: [storage]
      summary: Serve a stored object
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object file

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Community ──────────────────────────────────────────────────────────────
    CommunityStats:
      type: object
      properties:
        memberCount:
          type: integer
        eventCount:
          type: integer
        forumPostCount:
          type: integer
        resourceCount:
          type: integer
        listingCount:
          type: integer
      required: [memberCount, eventCount, forumPostCount, resourceCount, listingCount]

    ActivityItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [event_created, forum_post, resource_uploaded, listing_created, member_joined]
        actorId:
          type: string
        actorName:
          type: string
        actorAvatar:
          type: string
          nullable: true
        title:
          type: string
        link:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, type, actorId, actorName, title, link, createdAt]

    # ── Users ──────────────────────────────────────────────────────────────────
    PublicUser:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
          nullable: true
        displayName:
          type: string
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
          enum: [participant, administrator]
        location:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        skills:
          type: array
          items:
            type: string
        joinedAt:
          type: string
          format: date-time
      required: [id, displayName, role, skills, joinedAt]

    MemberListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PublicUser"
        nextCursor:
          type: string
          nullable: true
      required: [items, nextCursor]

    UserProfile:
      type: object
      properties:
        id:
          type: string
        clerkId:
          type: string
        username:
          type: string
          nullable: true
        displayName:
          type: string
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
          enum: [participant, administrator]
        skills:
          type: array
          items:
            type: string
        location:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        isBanned:
          type: boolean
        joinedAt:
          type: string
          format: date-time
      required: [id, clerkId, displayName, role, skills, isBanned, joinedAt]

    UpdateProfileBody:
      type: object
      properties:
        displayName:
          type: string
        username:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        skills:
          type: array
          items:
            type: string
        location:
          type: string
          nullable: true
        website:
          type: string
          nullable: true

    UserListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/UserProfile"
        total:
          type: integer
      required: [users, total]

    # ── Events ─────────────────────────────────────────────────────────────────
    Event:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        location:
          type: string
          nullable: true
        capacity:
          type: integer
          nullable: true
        isOnline:
          type: boolean
        meetingUrl:
          type: string
          nullable: true
        coverUrl:
          type: string
          nullable: true
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, title, slug, description, startsAt, endsAt, isOnline, createdBy, createdAt]

    EventDetail:
      allOf:
        - $ref: "#/components/schemas/Event"
