          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        color:
          type: string
        postCount:
          type: integer
      required: [id, name, slug, color, postCount]

    CreateForumCategoryBody:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        color:
          type: string
      required: [name, slug, color]

    ForumPostSummary:
      type: object
      properties:
