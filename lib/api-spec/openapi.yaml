openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AI Community Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profiles and member directory
  - name: events
    description: Events and RSVPs
  - name: forum
    description: Forum posts and replies
  - name: resources
    description: Resource library
  - name: marketplace
    description: Marketplace listings and messages
  - name: notifications
    description: In-app notifications
  - name: admin
    description: Admin moderation
  - name: reports
    description: User-submitted content reports
  - name: landing
    description: Editable landing content
  - name: storage
    description: File storage
  - name: community
    description: Community-wide aggregates

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Community stats (wow endpoint) ──────────────────────────────────────────
  /community/stats:
    get:
      operationId: getCommunityStats
      tags: [community]
      summary: Get community-wide statistics
      responses:
        "200":
          description: Community stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityStats"

  /activity/feed:
    get:
      operationId: getActivityFeed
      tags: [community]
      summary: Recent activity feed across all modules
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Activity feed items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # ── Users / Member Directory ────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/me/avatar:
    post:
      operationId: uploadAvatar
      tags: [users]
      summary: Upload avatar image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
              required: [avatar]
      responses:
        "200":
          description: Avatar uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadAvatarResponse"

  /users/check-username:
    get:
      operationId: checkUsernameAvailability
      tags: [users]
      summary: Check if a username is available
      parameters:
        - name: value
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Username availability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckUsernameResponse"

  /users/by-username/{username}:
    get:
      operationId: getUserByUsername
      tags: [users]
      summary: Get a public user profile by username
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicUser"
        "404":
          description: User not found

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List members (public directory, cursor-paginated)
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
            enum: [participant, administrator]
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 24
            maximum: 60
      responses:
        "200":
          description: Cursor-paginated member list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberListResponse"

  /users/{userId}:
    get:
      operationId: getUserById
      tags: [users]
      summary: Get a user profile by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/me/card-visibility:
    patch:
      operationId: updateCardVisibility
      tags: [users]
      summary: Toggle member card public visibility
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CardVisibilityBody"
      responses:
        "200":
          description: Updated visibility
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardVisibilityResponse"

  # ── Public (no auth) ─────────────────────────────────────────────────────────
  /public/users/{username}:
    get:
      operationId: getMemberCard
      tags: [users]
      summary: Get public member card by username (no auth required)
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Member card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberCard"
        "404":
          description: User not found or profile is private

  /public/users/{username}/stats:
    get:
      operationId: getMemberStats
      tags: [users]
      summary: Get member activity stats (no auth required)
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Member stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberStats"
        "404":
          description: User not found or profile is private

  # ── Events ──────────────────────────────────────────────────────────────────
  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events (cursor-paginated)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [upcoming, past]
            default: upcoming
        - name: mode
          in: query
          schema:
            type: string
            enum: [online, in_person]
        - name: q
          in: query
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 12
            maximum: 60
      responses:
        "200":
          description: Cursor-paginated events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventListPageResponse"

  /events/upcoming:
    get:
      operationId: getUpcomingEvents
      tags: [events]
      summary: Get upcoming events (dashboard widget)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Upcoming events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventDetail"

  /events/{slug}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get a single event by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Event details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDetail"
        "404":
          description: Not found

  /events/{slug}/rsvp:
    post:
      operationId: rsvpEvent
      tags: [events]
      summary: RSVP to an event (going / interested / cancelled)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RsvpBody"
      responses:
        "200":
          description: RSVP result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventRsvp"
        "409":
          description: Event full

  /admin/events:
    get:
      operationId: adminListEvents
      tags: [events]
      summary: List all events for admin management
      responses:
        "200":
          description: All events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventDetail"
    post:
      operationId: adminCreateEvent
      tags: [events]
      summary: Create an event (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventBody"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDetail"

  /admin/events/{slug}:
    patch:
      operationId: adminUpdateEvent
      tags: [events]
      summary: Update an event (admin)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventBody"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventDetail"
    delete:
      operationId: adminDeleteEvent
      tags: [events]
      summary: Delete an event (admin)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /admin/events/{slug}/cover:
    post:
      operationId: adminUploadEventCover
      tags: [events]
      summary: Upload event cover image (admin)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                cover:
                  type: string
                  format: binary
              required: [cover]
      responses:
        "200":
          description: Cover URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventCoverResponse"

  # ── Forum ────────────────────────────────────────────────────────────────────
  /forum/categories:
    get:
      operationId: listForumCategories
      tags: [forum]
      summary: List forum categories with thread/post counts
      responses:
        "200":
          description: Categories with counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ForumCategoryWithCounts"

  /forum/categories/{slug}/threads:
    get:
      operationId: listForumThreads
      tags: [forum]
      summary: List threads in a category (pinned first, then by last_activity_at desc)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated thread list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreadListPageResponse"

  /forum/threads:
    post:
      operationId: createForumThread
      tags: [forum]
      summary: Create a new forum thread
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateThreadBody"
      responses:
        "201":
          description: Created thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForumThread"

  /forum/threads/{threadId}:
    get:
      operationId: getForumThread
      tags: [forum]
      summary: Get a thread with all its posts and reactions
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Thread detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForumThreadDetail"
    patch:
      operationId: updateForumThread
      tags: [forum]
      summary: Edit thread body/title (own within 15 min, or admin)
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateThreadBody"
      responses:
        "200":
          description: Updated thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForumThread"
    delete:
      operationId: deleteForumThread
      tags: [forum]
      summary: Delete a thread (author or admin)
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /forum/threads/{threadId}/posts:
    post:
      operationId: createForumPost
      tags: [forum]
      summary: Post a reply to a thread
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostBody"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForumPostWithAuthor"

  /forum/posts/{postId}:
    patch:
      operationId: updateForumPost
      tags: [forum]
      summary: Edit a post (own within 15 min, or admin)
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePostBody"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForumPostWithAuthor"
    delete:
      operationId: deleteForumPost
      tags: [forum]
      summary: Delete a post (author or admin)
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /forum/posts/{postId}/reactions:
    post:
      operationId: toggleForumReaction
      tags: [forum]
      summary: Toggle an emoji reaction on a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReactBody"
      responses:
        "200":
          description: Updated reactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReactionSummary"

  /admin/forum/threads/{threadId}/pin:
    post:
      operationId: adminPinThread
      tags: [forum]
      summary: Toggle pin on a thread (admin only)
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForumThread"

  /admin/forum/threads/{threadId}/lock:
    post:
      operationId: adminLockThread
      tags: [forum]
      summary: Toggle lock on a thread (admin only)
      parameters:
        - name: threadId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated thread
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForumThread"

  # ── Resources ────────────────────────────────────────────────────────────────
  /resources:
    get:
      operationId: listResources
      tags: [resources]
      summary: List published resources (+ own unpublished)
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: tags
          in: query
          schema:
            type: string
            description: Comma-separated tag list
        - name: type
          in: query
          schema:
            type: string
            enum: [link, file, course]
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated resources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceListResponse"
    post:
      operationId: createResource
      tags: [resources]
      summary: Submit a new resource (published=false by default)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResourceBody"
      responses:
        "201":
          description: Created resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"

  /resources/{slug}:
    get:
      operationId: getResource
      tags: [resources]
      summary: Get a single resource by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
    delete:
      operationId: deleteResource
      tags: [resources]
      summary: Delete a resource (author or admin)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /resources/{slug}/file:
    post:
      operationId: uploadResourceFile
      tags: [resources]
      summary: Upload file for a resource of type=file (multipart)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Updated resource with filePath set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"

  /admin/resources:
    get:
      operationId: adminListResources
      tags: [resources]
      summary: List pending (unpublished) resources for moderation
      responses:
        "200":
          description: Pending resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resource"

  /admin/resources/{slug}/publish:
    post:
      operationId: adminPublishResource
      tags: [resources]
      summary: Approve and publish a resource
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Published resource
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"

  /admin/resources/{slug}/reject:
    post:
      operationId: adminRejectResource
      tags: [resources]
      summary: Reject and delete a resource
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminRejectResourceBody"
      responses:
        "204":
          description: Rejected and deleted

  # ── Marketplace ──────────────────────────────────────────────────────────────
  /marketplace/listings:
    get:
      operationId: listMarketplaceListings
      tags: [marketplace]
      summary: List marketplace listings (active; sellers see own too)
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated listings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingListResponse"
    post:
      operationId: createMarketplaceListing
      tags: [marketplace]
      summary: Create a listing (status=pending)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateListingBody"
      responses:
        "201":
          description: Created listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceListing"

  /marketplace/my-listings:
    get:
      operationId: getMyListings
      tags: [marketplace]
      summary: Get all listings belonging to the current seller
      responses:
        "200":
          description: Seller listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketplaceListing"

  /marketplace/listings/{slug}:
    get:
      operationId: getMarketplaceListing
      tags: [marketplace]
      summary: Get a listing by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceListing"
    patch:
      operationId: updateMarketplaceListing
      tags: [marketplace]
      summary: Update a listing (seller or admin)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateListingBody"
      responses:
        "200":
          description: Updated listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceListing"

  /marketplace/listings/{slug}/images:
    post:
      operationId: uploadListingImages
      tags: [marketplace]
      summary: Upload images for a listing (max 6, multipart/form-data)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        "200":
          description: Uploaded images
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ListingImage"

  /marketplace/listings/{slug}/sold:
    post:
      operationId: markListingAsSold
      tags: [marketplace]
      summary: Mark a listing as sold (seller only)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceListing"

  /marketplace/listings/{slug}/messages:
    post:
      operationId: sendListingMessage
      tags: [marketplace]
      summary: Send a message about a listing
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Sent message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingMessage"

  /admin/marketplace/listings/{slug}/approve:
    post:
      operationId: adminApproveMarketplaceListing
      tags: [marketplace]
      summary: Approve a listing (admin)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approved listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceListing"

  /admin/marketplace/listings/{slug}/reject:
    post:
      operationId: adminRejectMarketplaceListing
      tags: [marketplace]
      summary: Reject a listing (admin)
      parameters:
        - name: slug
          in: path
