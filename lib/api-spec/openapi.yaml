          type: string
        title:
          type: string
        categoryId:
          type: string
        categoryName:
          type: string
        authorId:
          type: string
        authorName:
          type: string
        authorAvatar:
          type: string
          nullable: true
        replyCount:
          type: integer
        reactionCount:
