components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Community ──────────────────────────────────────────────────────────────
    CommunityStats:
      type: object
      properties:
        memberCount:
          type: integer
        eventCount:
          type: integer
        forumPostCount:
          type: integer
        resourceCount:
          type: integer
        listingCount:
          type: integer
      required: [memberCount, eventCount, forumPostCount, resourceCount, listingCount]

    ActivityItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [event_created, forum_post, resource_uploaded, listing_created, member_joined]
        actorId:
          type: string
        actorName:
          type: string
        actorAvatar:
          type: string
          nullable: true
        title:
          type: string
        link:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, type, actorId, actorName, title, link, createdAt]

    # ── Users ──────────────────────────────────────────────────────────────────
    PublicUser:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
          nullable: true
        displayName:
          type: string
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
          enum: [participant, administrator]
        location:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        skills:
          type: array
          items:
            type: string
        joinedAt:
          type: string
          format: date-time
      required: [id, displayName, role, skills, joinedAt]

    MemberListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PublicUser"
        nextCursor:
          type: string
          nullable: true
      required: [items, nextCursor]

    MemberCard:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
          enum: [participant, administrator]
        location:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        skills:
          type: array
          items:
            type: string
        joinedAt:
          type: string
          format: date-time
      required: [id, username, displayName, role, skills, joinedAt]

    MemberStats:
      type: object
      properties:
        eventsAttended:
          type: integer
        threadsCreated:
          type: integer
        resourcesShared:
          type: integer
        memberSince:
          type: string
          format: date-time
      required: [eventsAttended, threadsCreated, resourcesShared, memberSince]

    CardVisibilityBody:
      type: object
      properties:
        isPublic:
          type: boolean
      required: [isPublic]

    CardVisibilityResponse:
      type: object
      properties:
        isPublic:
          type: boolean
      required: [isPublic]

    UserProfile:
      type: object
      properties:
        id:
          type: string
        clerkId:
          type: string
        username:
          type: string
          nullable: true
        displayName:
          type: string
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
          enum: [participant, administrator]
        skills:
          type: array
          items:
            type: string
        location:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        isBanned:
          type: boolean
        isPublic:
          type: boolean
        disabledAt:
          type: string
          format: date-time
          nullable: true
        joinedAt:
          type: string
          format: date-time
      required: [id, clerkId, displayName, role, skills, isBanned, isPublic, joinedAt]

    UpdateProfileBody:
      type: object
      properties:
        displayName:
          type: string
        username:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        skills:
          type: array
          items:
            type: string
        location:
          type: string
          nullable: true
        website:
          type: string
          nullable: true

    UserListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/UserProfile"
        total:
          type: integer
      required: [users, total]

    # ── Events ─────────────────────────────────────────────────────────────────
    Event:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        location:
          type: string
          nullable: true
        capacity:
          type: integer
          nullable: true
        isOnline:
          type: boolean
        meetingUrl:
          type: string
          nullable: true
        coverUrl:
          type: string
          nullable: true
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, title, slug, description, startsAt, endsAt, isOnline, createdBy, createdAt]

    EventDetail:
      allOf:
        - $ref: "#/components/schemas/Event"
        - type: object
          properties:
            counts:
              type: object
              properties:
                going:
                  type: integer
                interested:
                  type: integer
              required: [going, interested]
            myRsvp:
              type: string
              enum: [going, interested, cancelled]
              nullable: true
          required: [counts]

    EventListPageResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/EventDetail"
        nextCursor:
          type: string
          nullable: true
      required: [items, nextCursor]

    EventRsvp:
      type: object
      properties:
        id:
          type: string
        eventId:
          type: string
        userId:
          type: string
        status:
          type: string
          enum: [going, interested, cancelled]
        createdAt:
          type: string
          format: date-time
      required: [id, eventId, userId, status, createdAt]

    RsvpBody:
      type: object
      properties:
        status:
          type: string
          enum: [going, interested, cancelled]
      required: [status]

    CreateEventBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        location:
          type: string
          nullable: true
        capacity:
          type: integer
          nullable: true
        isOnline:
          type: boolean
        meetingUrl:
          type: string
          nullable: true
        coverUrl:
          type: string
          nullable: true
      required: [title, description, startsAt, endsAt]

    UpdateEventBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        location:
          type: string
          nullable: true
        capacity:
          type: integer
          nullable: true
        isOnline:
          type: boolean
        meetingUrl:
          type: string
          nullable: true
        coverUrl:
          type: string
          nullable: true

    EventCoverResponse:
      type: object
      properties:
        coverUrl:
          type: string
      required: [coverUrl]

    # ── Forum ──────────────────────────────────────────────────────────────────
    ForumCategory:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        color:
          type: string
        orderIndex:
          type: integer
      required: [id, name, slug, color, orderIndex]

    ForumCategoryWithCounts:
      allOf:
        - $ref: "#/components/schemas/ForumCategory"
        - type: object
          properties:
            threadCount:
              type: integer
            postCount:
              type: integer
          required: [threadCount, postCount]

    ForumThread:
      type: object
      properties:
        id:
          type: string
        categoryId:
          type: string
        categorySlug:
          type: string
        authorId:
          type: string
        authorName:
          type: string
        authorAvatar:
          type: string
          nullable: true
        title:
          type: string
        slug:
          type: string
        pinned:
          type: boolean
        locked:
          type: boolean
        postCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        lastActivityAt:
          type: string
          format: date-time
      required: [id, categoryId, categorySlug, authorId, authorName, title, slug, pinned, locked, postCount, createdAt, lastActivityAt]

    ForumThreadDetail:
      allOf:
        - $ref: "#/components/schemas/ForumThread"
        - type: object
          properties:
            body:
              type: string
            posts:
              type: array
              items:
                $ref: "#/components/schemas/ForumPostWithAuthor"
          required: [body, posts]

    ForumPostWithAuthor:
      type: object
      properties:
        id:
          type: string
        threadId:
          type: string
        authorId:
          type: string
        authorName:
          type: string
        authorAvatar:
          type: string
          nullable: true
        body:
          type: string
        parentPostId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        editedAt:
          type: string
          format: date-time
          nullable: true
        reactions:
          type: array
          items:
            $ref: "#/components/schemas/ReactionSummary"
      required: [id, threadId, authorId, authorName, body, createdAt, reactions]

    ThreadListPageResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ForumThread"
        nextCursor:
          type: string
          nullable: true
        categoryName:
          type: string
        categoryColor:
          type: string
      required: [items, categoryName, categoryColor]

    CreateThreadBody:
      type: object
      properties:
        categorySlug:
          type: string
        title:
          type: string
        body:
          type: string
      required: [categorySlug, title, body]

    UpdateThreadBody:
      type: object
      properties:
        title:
          type: string
        body:
          type: string

    CreatePostBody:
      type: object
      properties:
        body:
          type: string
        parentPostId:
          type: string
          nullable: true
      required: [body]

    UpdatePostBody:
      type: object
      properties:
        body:
          type: string
      required: [body]

    ReactBody:
      type: object
      properties:
        emoji:
          type: string
      required: [emoji]

    ReactionSummary:
      type: object
      properties:
        emoji:
          type: string
        count:
          type: integer
        hasReacted:
          type: boolean
      required: [emoji, count, hasReacted]

    # ── Resources ──────────────────────────────────────────────────────────────
    Resource:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        slug:
          type: string
        type:
          type: string
          enum: [link, file, course]
        url:
          type: string
          nullable: true
        filePath:
          type: string
          nullable: true
        description:
          type: string
        coverUrl:
          type: string
          nullable: true
        authorId:
          type: string
        authorName:
          type: string
        authorAvatar:
          type: string
          nullable: true
        published:
          type: boolean
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
      required: [id, title, slug, type, description, authorId, authorName, published, tags, createdAt]

    ResourceListResponse:
      type: object
      properties:
        resources:
          type: array
          items:
            $ref: "#/components/schemas/Resource"
        nextCursor:
          type: string
          nullable: true
      required: [resources]

    CreateResourceBody:
      type: object
      properties:
        title:
          type: string
        type:
          type: string
          enum: [link, file, course]
        url:
          type: string
          nullable: true
        description:
          type: string
        coverUrl:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
      required: [title, type]

    AdminRejectResourceBody:
      type: object
      properties:
        reason:
          type: string
      required: [reason]

    # ── Marketplace ────────────────────────────────────────────────────────────
    MarketplaceListing:
      type: object
      properties:
        id:
